# DnD 5e 默认世界观/规则模板。
#
# 任何"系统 = dnd5e"的团默认继承此文件。可在 campaign.yaml 的 `worldview_overrides`
# 字段里覆盖以下任意字段，覆盖优先级：campaign.yaml > 本文件。
#
# 团自由文本（背景、势力、地点）请写到 <campaign>/worldview.md，会作为 custom_lore 注入。

system: dnd5e
display_name: "龙与地下城 5e"

# ---------------------------------------------------------------------------
# 起草阶段：禁用机制词。任何小说语境下不应出现的规则词。
# ---------------------------------------------------------------------------
banned_words:
  - 判定
  - 检定
  - DC
  - D20
  - 命中值
  - AC
  - HP
  - 法术位
  - 先攻
  - 回合
  - 豁免
  - 掷骰
  - d20
  - dc
  - ac
  - hp

# ---------------------------------------------------------------------------
# 掷骰演绎规则：把骰子结果转换成文学描写的指导原则。
# 起草模型会读到这些条目并在写到对应桥段时套用风格。
# ---------------------------------------------------------------------------
roll_translation_rules:
  critical_success: "用'剑锋如流星'/'震耳咆哮'等有力描写，强调成果决定性"
  success: "正常有效描写，按行动意图直接达成"
  failure: "用'脚下一滑'/'剑势走偏'/'护甲弹开了力道'等表达失手，但不戳破"
  critical_failure: "强调失措/被动，给角色尴尬或代价，但不可滑稽化"
  guidance: "不要提任何数字；通过结果文字和 DM 反应判断成败"

# ---------------------------------------------------------------------------
# 风格设定（默认基调，可在 campaign 层覆盖）
# ---------------------------------------------------------------------------
prose_style:
  pov: "第三人称全知 + 浮动焦点（《沙丘》《三体》风格）。每个场景一个情感焦点角色，旁白可切换"
  tone: "王道明快、热血。悲壮处克制，不煽情。有'勇者斗恶龙'的爽快感"
  reference_authors:
    - "田中芳树《银英》的群像调度"
    - "高桥留美子的日常温度"
    - "ABRA 系小说在关键战斗中的爽快"
  expansion_ratio: "源材料字数 × 2.0~2.5 倍。不用'写够字数'，写够情节、写好文字"

# ---------------------------------------------------------------------------
# 人物卡注入原则（起草时如何使用 character_cards 的 atomic facts）
# ---------------------------------------------------------------------------
card_injection_principle: |
  只用角色事实来"补充"玩家没有自己演绎出的部分，
  不要让 AI 抢先"演绎"玩家已经处理的情感。
  玩家已说的台词必须保留或等价再现（不可改写核心情感）。
