background_story: 一个贵族里一对姐弟互相照顾着生活，形影不离。因为长辈各忙各的，有多忙呢？已经五年不回家了，要知道小孩子的时间是比大人流逝的更缓慢的多。而当姐姐露尼西亚·冯·奥贝斯坦16岁时死了，死的很突然。从此，弟弟比尔的心里脑里装满了一个念头：复活姐姐。丹德莱就是其中一个试验体里衍生出来的，就像双胞胎其中她是妹妹，因为意识晚于露尼西亚出现。而小比尔对她们来个姐姐的复生品并不满意，继续做着实验，即使已经扩建了5000平米的地下室里都塞不下失败品和活死人了。其间，露尼西亚爱上了一位坚强足智多谋的指挥官，被比尔发现后，为了保护爱人而将比尔流放并时刻监视着他，她的妹妹丹德莱则替她接替家族的事业，和照顾她的爱人。因为不知道比尔用了什么歪门邪道做了这些实验，她又将家业给姐姐的爱人先掌管，自己踏上了寻找解决方法和姐姐的旅行。不知道她回来时，家宅何姓？她只能相信姐姐的眼光。
