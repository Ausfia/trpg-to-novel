background_story: '我出生在星光位面那片银色的虚空里，那里没有日出日落，没有四季更迭，万物永恒不老，时间像一条静止的河 —— 我在那里生活了 345
  年，看着同胞们在永恒的沉思里慢慢麻木，看着星界的光永远明亮却毫无温度。

  我开始厌倦这种 “没有终点的存在”：没有成长，没有离别，没有 “完成一件事” 的喜悦，连生命本身都因为永恒而失去了重量。我想知道 “时间流逝” 是什么感觉，想看看会枯萎的花、会老去的人、会被黑夜吞噬的夕阳
  —— 于是我背着竖琴，以 “远行者” 的身份，踏上了前往费伦大陆的旅途。

  来到这片陌生的土地后，我找到了对抗虚无的方式：每天清晨追着日出，傍晚守着日落，用这个仪式来标记时间的流逝，证明 “我真的在活着”。

  我着迷于费伦的一切：春日的樱花会在一夜之间绽放又凋零，凡人会为了一句誓言奔赴生死，篝火会在黎明前熄灭却留下温暖的余温 —— 这些都是星界永远不会有的 “真实”。我不想卷入琐碎的纷争，只想安静地做一个观察者，记录下所有短暂却炽热的瞬间。

  但我也知道，我的旅途不止于此，我也不可能永远只是一个观察者，在这片陌生的土地上，或许我会找到属于我的友谊与羁绊。'
